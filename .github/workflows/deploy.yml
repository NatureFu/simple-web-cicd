name: CI/CD Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Deploy to Cloud Server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        script: |
          cd /opt/simple-web-cicd || git clone https://github.com/NatureFu/simple-web-cicd.git /opt/simple-web-cicd && cd /opt/simple-web-cicd
          git pull
          docker build -t simple-web-cicd .
          docker stop test-app || true
          docker rm test-app || true
          docker run -d --name test-app -p 5000:5000 simple-web-cicd

